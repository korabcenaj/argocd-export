apiVersion: v1
items:
- apiVersion: v1
  kind: Service
  metadata:
    annotations:
      metallb.io/ip-allocated-from-pool: first-pool
    labels:
      app: qbittorrent
      cluster: home-lab
      date: '2026-04-09'
      environment: production
      managed-by: terraform
    name: qbittorrent
    namespace: qbittorrent
  spec:
    allocateLoadBalancerNodePorts: true
    clusterIP: 10.101.163.57
    clusterIPs:
    - 10.101.163.57
    externalTrafficPolicy: Cluster
    internalTrafficPolicy: Cluster
    ipFamilies:
    - IPv4
    ipFamilyPolicy: SingleStack
    ports:
    - name: web
      nodePort: 30978
      port: 8080
      protocol: TCP
      targetPort: 8080
    selector:
      app: qbittorrent
    sessionAffinity: None
    type: LoadBalancer
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    annotations: {}
    generation: 7
    labels:
      app: qbittorrent
      cluster: home-lab
      date: '2026-04-09'
      environment: production
      managed-by: terraform
    name: qbittorrent
    namespace: qbittorrent
  spec:
    progressDeadlineSeconds: 600
    replicas: 1
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: qbittorrent
    strategy:
      type: Recreate
    template:
      metadata:
        creationTimestamp: null
        labels:
          app: qbittorrent
      spec:
        automountServiceAccountToken: true
        containers:
        - env:
          - name: WEBUI_PORT
            value: '8080'
          image: linuxserver/qbittorrent:5.1.4
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: qbittorrent
          ports:
          - containerPort: 8080
            name: web
            protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /config
            mountPropagation: None
            name: config
        dnsPolicy: ClusterFirst
        enableServiceLinks: true
        nodeSelector:
          qbittorrent-node: enabled
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        shareProcessNamespace: false
        terminationGracePeriodSeconds: 30
        volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbit-config-pvc
kind: List
metadata:
  resourceVersion: ''
