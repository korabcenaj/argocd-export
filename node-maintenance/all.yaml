apiVersion: v1
items:
- apiVersion: apps/v1
  kind: DaemonSet
  metadata:
    annotations:
      deprecated.daemonset.template.generation: '2'
    generation: 2
    name: configure-local-registry
    namespace: node-maintenance
  spec:
    revisionHistoryLimit: 10
    selector:
      matchLabels:
        app: configure-local-registry
    template:
      metadata:
        creationTimestamp: null
        labels:
          app: configure-local-registry
      spec:
        containers:
        - command:
          - /bin/sh
          - -c
          - "set -eu\napk add --no-cache util-linux\nif [ -f /host/etc/containerd/config.toml\
            \ ]; then\n  sed -i '/\\[plugins\\.\"io.containerd.grpc.v1.cri\"\\.registry\\\
            ]/,/^\\[/ s#config_path = \"\"#config_path = \"/etc/containerd/certs.d\"\
            #' /host/etc/containerd/config.toml\n  sed -i '/\\[plugins\\.\"io.containerd.cri.v1.images\"\
            \\.registry\\]/,/^\\[/ s#config_path = \"\"#config_path = \"/etc/containerd/certs.d\"\
            #' /host/etc/containerd/config.toml\nfi\nmkdir -p /host/etc/containerd/certs.d/192.168.1.10:30500\n\
            cat > /host/etc/containerd/certs.d/192.168.1.10:30500/hosts.toml <<'EOF'\n\
            server = \"http://192.168.1.10:30500\"\n\n[host.\"http://192.168.1.10:30500\"\
            ]\n  capabilities = [\"pull\", \"resolve\", \"push\"]\n  skip_verify =\
            \ true\nEOF\nnsenter --target 1 --mount --uts --ipc --net --pid sh -c\
            \ 'systemctl restart containerd || systemctl restart snap.containerd.containerd\
            \ || true'\nsleep 5\nnsenter --target 1 --mount --uts --ipc --net --pid\
            \ sh -c 'systemctl is-active containerd || systemctl is-active snap.containerd.containerd\
            \ || true'\ngrep -n 'config_path = \"/etc/containerd/certs.d\"' /host/etc/containerd/config.toml\
            \ || true\nsleep 3600\n"
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          name: configure
          resources: {}
          securityContext:
            privileged: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /host/etc/containerd
            name: host-etc-containerd
        dnsPolicy: ClusterFirst
        hostNetwork: true
        hostPID: true
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext: {}
        terminationGracePeriodSeconds: 30
        tolerations:
        - operator: Exists
        volumes:
        - hostPath:
            path: /etc/containerd
            type: DirectoryOrCreate
          name: host-etc-containerd
    updateStrategy:
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
      type: RollingUpdate
kind: List
metadata:
  resourceVersion: ''
